<html lang="en">
<head>
<meta charset="UTF-8">

<title>Diagram template — D2 + Lerian</title>
<!-- ============================================================
     D2 + LERIAN DIAGRAM TEMPLATE v1.0.0
     Topology/connection diagrams are rendered by the D2 CLI to a
     static inline SVG, then dropped into .diagram-canvas below.
     Dark/light is baked INTO the SVG by D2 — no client-side lib.

     WHY D2 (not Mermaid): D2 (ELK/dagre layout) produces clean,
     deterministic layouts. The SVG is static — no render flicker,
     no foreignObject breakage, no theme-refresh bug.

     PREREQUISITE: the `d2` binary.
       command -v d2 || brew install d2     # or: curl -fsSL https://d2lang.com/install.sh | sh

     GENERATION:
       1. Write diagram.d2 starting with the LERIAN PREAMBLE below.
       2. d2 --theme=0 --dark-theme=200 --layout=elk diagram.d2 diagram.svg
       3. Strip the leading <?xml ...?> declaration from diagram.svg.
       4. Paste the <svg>...</svg> into .diagram-canvas (replacing the demo).
       The pan/zoom engine is SVG-agnostic: it reads viewBox and works as-is.

     ===== LERIAN D2 PREAMBLE (copy verbatim as the head of every .d2) =====
       vars: { d2-config: { layout-engine: elk; theme-id: 0; dark-theme-id: 200; pad: 20 } }
       classes: {
         source:    { style: { fill: "#FDCB28"; stroke: "#EDAC05"; font-color: "#27272A"; bold: true } }
         process:   { style: { fill: "#F4F4F5"; stroke: "#A1A1AA"; font-color: "#27272A" } }
         datastore: { shape: cylinder; style: { fill: "#5BCD86"; stroke: "#26934F"; font-color: "#1A1A1A" } }
         decision:  { shape: diamond;  style: { fill: "#FDE68A"; stroke: "#EAB308"; font-color: "#27272A" } }
         critical:  { style: { fill: "#F06E43"; stroke: "#C2410C"; font-color: "#FFFFFF"; bold: true } }
         external:  { style: { fill: "#E4E4E7"; stroke: "#71717A"; font-color: "#27272A"; stroke-dash: 4 } }
       }
       # apply with `myshape.class: source`; semantic edges: success "#26934F", error "#EF4444"
       # leave nodes unclassed to inherit the neutral theme. Do NOT invent roles not in the source.

     FOUNDATION / DEMO BOUNDARY: copy the <style> foundation, header,
     footer, date script, and diagram-shell engine. Replace the demo
     SVG and all demo copy with source-grounded content.
     ============================================================ -->

/* ===== LERIAN FOUNDATION TOKENS (mirror of standard.html; do not diverge) ===== */
:root{
  --font-body:'Inter',ui-sans-serif,system-ui,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
  --bg:oklch(96.7% 0.001 286.4);
  --surface:oklch(99% 0.002 286.4);
  --surface-muted:oklch(91.9% 0.004 286.3);
  --text:oklch(27.4% 0.006 286.0);
  --text-secondary:oklch(44.2% 0.017 285.8);
  --text-muted:oklch(70.5% 0.015 286.1);
  --accent:oklch(84.8% 0.166 88.9);
  --border:oklch(91.9% 0.004 286.3);
  --border-strong:oklch(87.1% 0.006 286.3);
  --radius:8px;--radius-lg:12px;--radius-full:9999px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
}
@media (prefers-color-scheme:dark){:root{
  --bg:oklch(27.4% 0.006 286.0);
  --surface:oklch(37% 0.013 285.8);
  --surface-muted:oklch(44.2% 0.017 285.8);
  --text:oklch(96.7% 0.001 286.4);
  --text-secondary:oklch(70.5% 0.015 286.1);
  --text-muted:oklch(55.2% 0.016 285.9);
  --border:oklch(44.2% 0.017 285.8);
  --border-strong:oklch(55.2% 0.016 285.9);
}}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);font-size:15px;line-height:1.6;color:var(--text);background:var(--bg);padding:40px 20px;-webkit-font-smoothing:antialiased}
.container{max-width:1000px;margin:0 auto}
.lerian-header{margin-bottom:28px}
.lerian-header .logo-mark{width:96px;height:auto;display:block;color:var(--text)}
h1{font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1.2;margin-bottom:8px}
.subtitle{color:var(--text-secondary);font-size:16px;max-width:640px;margin-bottom:8px}
.accent-bar{width:40px;height:4px;background:var(--accent);border-radius:var(--radius-full);margin:20px 0 16px}

/* ===== DIAGRAM SHELL — generic SVG pan/zoom (source-agnostic; reused by slides) ===== */
.diagram-shell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;margin:8px 0 24px}
.diagram-toolbar{display:flex;gap:6px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface-muted)}
.diagram-toolbar .title{font-size:13px;font-weight:600;color:var(--text)}
.diagram-toolbar .spacer{flex:1}
.diagram-label{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);min-width:42px;text-align:right}
.diagram-toolbar button{font:inherit;font-size:14px;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border-strong);background:var(--surface);color:var(--text-secondary);border-radius:6px;cursor:pointer;transition:.15s}
.diagram-toolbar button:hover{border-color:var(--accent);color:var(--text)}
.diagram-viewport{position:relative;height:600px;overflow:hidden;cursor:grab;background-image:radial-gradient(circle at 1px 1px,var(--border) 1px,transparent 0);background-size:22px 22px}
.diagram-viewport.grabbing{cursor:grabbing}
.diagram-canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.diagram-canvas svg{display:block}
.diagram-shell:fullscreen{border-radius:0}
.diagram-shell:fullscreen .diagram-viewport{height:calc(100vh - 51px)}

.lerian-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.footer-brand{display:flex;align-items:center;gap:12px}
.footer-brand .logo-mark{height:20px;width:auto;color:var(--text)}
.footer-company{font-weight:600;font-size:14px;color:var(--text)}
.footer-generated{font-size:13px;color:var(--text-secondary)}
.footer-date{font-size:13px;color:var(--text-muted)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
